<!DOCTYPE html>
<html>

<head>
  <title>Gemini 2.5 Flash Test</title>
</head>

<body>
  <h2>Gemini 2.5 Flash Test</h2>
  <button onclick="testAPI()">Test My Key</button>
  <p id="result">Click the button...</p>
  <pre id="fullResponse" style="background:#f0f0f0; padding:10px; margin-top:20px; white-space:pre-wrap;">
  </pre>

  <script>
    async function testAPI() {
      const apiKey = "AIzaSyBYlNfT4TDabmRH8LDyliY_SmOltMfs8Zs";
      document.getElementById("result").innerText = "Loading...";
      document.getElementById("fullResponse").innerText = "";

      try {
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: "Say hello in one sentence" }] }]
            })
          }
        );

        const data = await response.json();

        // Show full raw response
        document.getElementById("fullResponse").innerText =
          JSON.stringify(data, null, 2);

        // Extract text safely
        if (data.candidates && data.candidates[0]) {
          const text = data.candidates[0].content.parts[0].text;
          document.getElementById("result").innerText = "✅ Success: " + text;
        } else if (data.error) {
          document.getElementById("result").innerText =
            "❌ API Error: " + data.error.message;
        } else {
          document.getElementById("result").innerText =
            "⚠️ Unexpected response — see full response below";
        }

      } catch (error) {
        document.getElementById("result").innerText =
          "❌ Error: " + error.message;
      }
    }
  </script>
</body>

</html>
